<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abertura de Ativos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-hover: #ea580c;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --bg: #fdfdfd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        /* Container Slim */
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        /* O Botão - O texto dentro dele define o nome do favorito ao arrastar */
        .bookmark-btn {
            display: inline-block;
            width: 100%;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            cursor: grab;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
        }

        .bookmark-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(249, 115, 22, 0.3);
        }

        .bookmark-btn:active {
            cursor: grabbing;
        }

        /* Pequeno indicador visual de arraste */
        .hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Abertura de Ativos</h1>
        <p>Arraste o botão abaixo para ativar</p>

        <!-- O texto "ativar" será o nome do favorito no navegador -->
        <a class="bookmark-btn" href="javascript:(function(){  var s=document.createElement('script');  s.src='https://gambiarra.pages.dev/gambiarra.js';  s.type='text/javascript';  document.body.appendChild(s);})();">
            ativar
        </a>

        <div class="hint">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11l5-5m0 0l5 5m-5-5v12"></path></svg>
            solte na barra de favoritos
        </div>
    </div>

</body>
</html>
