<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMBIARRA_REMOTE_V4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg-color: #020202;
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --vhs-gray: #d1d1d1;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg-color);
            color: var(--neon-green);
            font-family: 'VT323', monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* EFEITOS VHS */
        .vhs-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; pointer-events: none; opacity: 0.15;
            background: url('https://media.giphy.com/media/oEI9uWUicG3Y166A7v/giphy.gif');
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.5) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.03), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%;
            z-index: 101; pointer-events: none;
        }

        /* OSD - ON SCREEN DISPLAY */
        .osd {
            position: absolute; top: 30px; left: 40px;
            font-size: 2.2rem; color: var(--vhs-gray);
            text-shadow: 3px 3px #000; z-index: 50;
        }

        .osd-rec {
            position: absolute; top: 30px; right: 40px;
            color: #ff0000; font-size: 2.2rem;
            animation: blink 1s steps(2) infinite;
        }

        /* LOGO DVD GAMBIARRA - DINÂMICO */
        #dvd-container {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 5;
        }

        .dvd-logo {
            position: absolute;
            font-size: clamp(6rem, 22vw, 28rem); 
            font-weight: 900;
            white-space: nowrap;
            color: var(--neon-pink);
            text-shadow: 12px 12px 0px #000;
            font-style: italic;
            letter-spacing: -10px;
            filter: drop-shadow(0 0 25px var(--neon-pink));
            line-height: 0.7;
            user-select: none;
            will-change: transform;
        }

        /* CARD CENTRAL */
        .main-frame {
            position: relative;
            z-index: 150;
            border: 8px double var(--neon-green);
            padding: 40px;
            background: rgba(0, 0, 0, 0.98);
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.4);
            width: 90%;
            max-width: 550px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: var(--neon-blue);
            text-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
        }

        /* TRUQUE DO BOTÃO: MOSTRA UM TEXTO, DRAGA OUTRO */
        .bookmark-btn {
            display: inline-block;
            margin: 30px 0;
            padding: 25px 40px;
            border: 4px solid var(--neon-green);
            background: transparent;
            color: var(--neon-green);
            text-decoration: none;
            font-size: 0; /* Esconde o texto real "ativar" */
            font-weight: 900;
            cursor: grab;
            transition: all 0.1s;
            box-shadow: 10px 10px 0px #000;
            text-transform: uppercase;
            position: relative;
        }

        .bookmark-btn::after {
            content: "instalar gambiarra"; /* Texto que o usuário vê */
            font-size: 2.5rem;
            display: block;
        }

        .bookmark-btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 60px var(--neon-green);
            transform: translate(-5px, -5px);
        }

        .terminal-text {
            font-size: 1.3rem;
            line-height: 1.4;
            text-align: left;
            border-top: 2px solid var(--neon-green);
            padding-top: 20px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* CINTILAÇÃO CRT */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.03);
            pointer-events: none; z-index: 200;
            animation: flicker 0.1s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.1; } 50% { opacity: 0.15; } 100% { opacity: 0.1; }
        }
    </style>
</head>
<body>

    <div class="vhs-noise"></div>
    <div class="scanlines"></div>

    <div class="osd">
        PLAY  00:00:15:23<br>
        REMOTE_INJECTOR
    </div>
    <div class="osd-rec">● REC</div>

    <div id="dvd-container">
        <div id="gambiarra" class="dvd-logo">GAMBIARRA</div>
    </div>

    <div class="main-frame">
        <h1>REVAN_OS_LINKER</h1>
        <p style="letter-spacing: 2px;">VIBRATION: ON | SOURCE: REMOTE</p>

        <!-- O LINK CONTÉM "ativar", MAS O CSS MOSTRA "instalar gambiarra" -->
        <a class="bookmark-btn" href="javascript:(function(){var s=document.createElement('script');s.src='https://gambiarra.pages.dev/gambiarra.js?v='+Math.random();document.body.appendChild(s);})();">ativar</a>

        <div class="terminal-text">
            > SISTEMA: PRONTO PARA INSTALAÇÃO<br>
            > AÇÃO: ARRASTE O BOTÃO ACIMA<br>
            > NOME DO FAVORITO: "ativar"<br>
            > USER_AUTH: GRANTED_<span style="animation: blink 0.8s infinite">█</span>
        </div>
    </div>

    <script>
        const logo = document.getElementById('gambiarra');
        
        // Física DVD Player
        let speed = 4; 
        let xSpeed = speed * (Math.random() > 0.5 ? 1 : -1);
        let ySpeed = (speed * 0.8) * (Math.random() > 0.5 ? 1 : -1);
        
        let x = Math.random() * (window.innerWidth - 400);
        let y = Math.random() * (window.innerHeight - 200);
        
        const neonColors = ['#ff00ff', '#00ffff', '#39ff14', '#ffff00', '#ff3300', '#0066ff'];
        let colorIndex = 0;

        function update() {
            x += xSpeed;
            y += ySpeed;

            const rect = logo.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;

            if (x + width >= window.innerWidth || x <= 0) {
                xSpeed *= -1;
                x = x <= 0 ? 0 : window.innerWidth - width;
                addDrift();
                hit();
            }

            if (y + height >= window.innerHeight || y <= 0) {
                ySpeed *= -1;
                y = y <= 0 ? 0 : window.innerHeight - height;
                addDrift();
                hit();
            }

            logo.style.transform = `translate(${x}px, ${y}px)`;
            requestAnimationFrame(update);
        }

        function addDrift() {
            xSpeed += (Math.random() - 0.5) * 0.4;
            ySpeed += (Math.random() - 0.5) * 0.4;
        }

        function hit() {
            colorIndex = (colorIndex + 1) % neonColors.length;
            const c = neonColors[colorIndex];
            logo.style.color = c;
            logo.style.filter = `drop-shadow(0 0 35px ${c})`;
            
            const frame = document.querySelector('.main-frame');
            frame.style.borderColor = c;
            setTimeout(() => { frame.style.borderColor = 'var(--neon-green)'; }, 100);
        }

        window.addEventListener('resize', () => {
            x = Math.min(x, window.innerWidth - logo.offsetWidth);
            y = Math.min(y, window.innerHeight - logo.offsetHeight);
        });

        update();
    </script>
</body>
</html>
